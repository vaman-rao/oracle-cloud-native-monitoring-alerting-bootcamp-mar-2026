version: '3.8'

# =============================================================
# Clinic Management Microservices - Full Stack
# Services: MySQL | Eureka | Gateway | Appointment | Doctor | Patient | Prometheus | Grafana
# =============================================================

networks:
  clinic-network:
    driver: bridge

volumes:
  mysql-data:
  prometheus-data:
  grafana-data:

services:

  # -----------------------------------------------------------
  # MySQL Database
  # Each microservice uses its own schema (database) within this
  # single MySQL instance. Schemas are auto-created by Spring JPA
  # on first startup via createDatabaseIfNotExist=true
  # -----------------------------------------------------------
  mysql-db:
    image: mysql:8.0
    container_name: clinic-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root_pass
      MYSQL_USER: clinic_user
      MYSQL_PASSWORD: clinic_pass
      # Root creates the user and grants permissions to all schemas
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./mysql-init:/docker-entrypoint-initdb.d   # runs init SQL on first start
    networks:
      - clinic-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot_pass"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # -----------------------------------------------------------
  # Eureka Discovery Server (must start first)
  # -----------------------------------------------------------
  eureka-server:
    build:
      context: ./oracle-clinic-eureka-server
      dockerfile: Dockerfile
    container_name: clinic-eureka-server
    restart: on-failure
    ports:
      - "8761:8761"
    networks:
      - clinic-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8761/actuator/health"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 40s

  # -----------------------------------------------------------
  # API Gateway
  # -----------------------------------------------------------
  api-gateway:
    build:
      context: ./oracle-clinic-api-gateway
      dockerfile: Dockerfile
    container_name: clinic-api-gateway
    restart: on-failure
    ports:
      - "9001:9001"
    environment:
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka/
    networks:
      - clinic-network
    depends_on:
      eureka-server:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:9001/actuator/health"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 40s

  # -----------------------------------------------------------
  # Appointment Microservice
  # -----------------------------------------------------------
  appointment-service:
    build:
      context: ./oracle-appointment-service
      dockerfile: Dockerfile
    container_name: clinic-appointment-service
    restart: on-failure
    ports:
      - "9002:9002"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql-db:3306/clinic_appointment_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
      - SPRING_DATASOURCE_USERNAME=clinic_user
      - SPRING_DATASOURCE_PASSWORD=clinic_pass
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka/
    networks:
      - clinic-network
    depends_on:
      mysql-db:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:9002/actuator/health"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 60s

  # -----------------------------------------------------------
  # Doctor Microservice
  # -----------------------------------------------------------
  doctor-service:
    build:
      context: ./oracle-doctor-service
      dockerfile: Dockerfile
    container_name: clinic-doctor-service
    restart: on-failure
    ports:
      - "9003:9003"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql-db:3306/clinic_doctor_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
      - SPRING_DATASOURCE_USERNAME=clinic_user
      - SPRING_DATASOURCE_PASSWORD=clinic_pass
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka/
    networks:
      - clinic-network
    depends_on:
      mysql-db:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:9003/actuator/health"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 60s

  # -----------------------------------------------------------
  # Patient Microservice
  # -----------------------------------------------------------
  patient-service:
    build:
      context: ./oracle-patient-service
      dockerfile: Dockerfile
    container_name: clinic-patient-service
    restart: on-failure
    ports:
      - "9004:9004"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql-db:3306/clinic_patient_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
      - SPRING_DATASOURCE_USERNAME=clinic_user
      - SPRING_DATASOURCE_PASSWORD=clinic_pass
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka/
    networks:
      - clinic-network
    depends_on:
      mysql-db:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:9004/actuator/health"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 60s

  # -----------------------------------------------------------
  # Prometheus - Metrics Collector
  # Scrapes /actuator/prometheus from all 5 Spring Boot services
  # -----------------------------------------------------------
  prometheus:
    image: prom/prometheus:latest
    container_name: clinic-prometheus
    restart: always
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=15d'
      - '--web.enable-lifecycle'        # allows hot-reload via POST /-/reload
    networks:
      - clinic-network
    depends_on:
      - eureka-server
      - api-gateway
      - appointment-service
      - doctor-service
      - patient-service

  # -----------------------------------------------------------
  # Grafana - Metrics Visualizer
  # Pre-configured with Prometheus datasource and dashboard
  # -----------------------------------------------------------
  grafana:
    image: grafana/grafana:latest
    container_name: clinic-grafana
    restart: always
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin123
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning/datasources:/etc/grafana/provisioning/datasources
      - ./grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards
    networks:
      - clinic-network
    depends_on:
      - prometheus
