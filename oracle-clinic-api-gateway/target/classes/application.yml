server:
  port: 9001

spring:
  application:
    name: oracle-clinic-api-gateway

  cloud:
    gateway:
      # Automatically create routes from Eureka-registered services
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true

      # Explicit routes for each microservice
      routes:
        - id: appointment-service
          uri: lb://oracle-appointment-service
          predicates:
            - Path=/oracle-appointment-service/**
          filters:
            - StripPrefix=1

        - id: doctor-service
          uri: lb://oracle-doctor-service
          predicates:
            - Path=/oracle-doctor-service/**
          filters:
            - StripPrefix=1

        - id: patient-service
          uri: lb://oracle-patient-service
          predicates:
            - Path=/oracle-patient-service/**
          filters:
            - StripPrefix=1

eureka:
  client:
    service-url:
      defaultZone: http://eureka-server:8761/eureka/
  instance:
    prefer-ip-address: true

# -------------------------------------------------------
# Actuator + Prometheus Monitoring
# -------------------------------------------------------
management:
  endpoints:
    web:
      exposure:
        include: health, info, prometheus, metrics, gateway
  endpoint:
    health:
      show-details: always
    gateway:
      enabled: true
  metrics:
    tags:
      application: ${spring.application.name}

logging:
  level:
    org.springframework.cloud.gateway: INFO
    reactor.netty: WARN
