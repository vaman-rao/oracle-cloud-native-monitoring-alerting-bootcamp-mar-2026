server:
  port: 9002

spring:
  application:
    name: oracle-appointment-service

  # -------------------------------------------------------
  # MySQL DataSource (replaces MongoDB)
  # -------------------------------------------------------
  datasource:
    url: jdbc:mysql://mysql-db:3306/clinic_appointment_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: clinic_user
    password: clinic_pass
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update          # auto-creates/updates tables from @Entity classes
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true

eureka:
  client:
    service-url:
      defaultZone: http://eureka-server:8761/eureka/
  instance:
    prefer-ip-address: true

# -------------------------------------------------------
# Actuator + Prometheus Monitoring
# -------------------------------------------------------
management:
  endpoints:
    web:
      exposure:
        include: health, info, prometheus, metrics, env, loggers
  endpoint:
    prometheus: 
      enabled: true
    health:
      show-details: always
  metrics:
    tags:
      application: ${spring.application.name}   

logging:
  level:
    com.ibm.appointment: DEBUG
    org.springframework.web: INFO
