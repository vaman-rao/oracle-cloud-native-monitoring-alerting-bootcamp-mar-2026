global:
  scrape_interval: 15s
  evaluation_interval: 15s
  scrape_timeout: 10s

scrape_configs:

  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'oracle-clinic-eureka-server'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['eureka-server:8761']
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: 'eureka-server'

  - job_name: 'oracle-clinic-api-gateway'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['api-gateway:9001']
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: 'api-gateway'

  - job_name: 'oracle-appointment-service'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['appointment-service:9002']
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: 'appointment-service'

  - job_name: 'oracle-doctor-service'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['doctor-service:9003']
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: 'doctor-service'

  - job_name: 'oracle-patient-service'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['patient-service:9004']
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: 'patient-service'
